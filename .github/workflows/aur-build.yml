name: AUR package build (verification)

# Verifies that packaging/aur/PKGBUILD still builds and installs cleanly.
# Intentionally NOT run on every push to master:
#   - the release pipeline (release.yml -> build_aur) already builds the
#     PKGBUILD on every tag and on workflow_dispatch
#   - the CI workflow (ci.yml -> aur-metadata) validates .SRCINFO on every push
# This workflow runs only when packaging metadata changes in a PR, or when
# explicitly triggered from the Actions UI.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'packaging/aur/**'
      - '.github/workflows/aur-build.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aur-build:
    name: Build and install AUR package
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    timeout-minutes: 90

    steps:
      - name: Configure pacman mirrors
        run: |
          # shellcheck disable=SC2016 # $repo and $arch are pacman placeholders, not shell vars
          printf 'Server = https://mirrors.kernel.org/archlinux/$repo/os/$arch\nServer = https://mirror.rackspace.com/archlinux/$repo/os/$arch\n' \
            > /etc/pacman.d/mirrorlist
          sed -i 's/^#ParallelDownloads.*/ParallelDownloads = 5/' /etc/pacman.conf
          grep -q DisableDownloadTimeout /etc/pacman.conf \
            || echo DisableDownloadTimeout >> /etc/pacman.conf

      - name: System update + base-devel + git
        run: pacman -Syu --noconfirm --needed base-devel git sudo

      - name: Install makedepends
        run: pacman -S --noconfirm --needed rust nodejs pnpm dotnet-sdk

      - name: Install Tauri system dependencies
        run: |
          # makepkg runs with -d (skip dep checks), so PKGBUILD makedepends are
          # not auto-installed. xdg-utils provides xdg-open, needed by Tauri's
          # AppImage bundler at bundle time.
          pacman -S --noconfirm --needed \
            webkit2gtk-4.1 gtk3 openssl libayatana-appindicator librsvg xdg-utils

      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Set up builder user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
          mkdir -p /build
          cp packaging/aur/PKGBUILD packaging/aur/.SRCINFO /build/
          chown -R builder /build

      - name: Build package
        run: |
          sudo -u builder bash -c "
            cd /build
            makepkg -d --noconfirm --noprogressbar
          "

      - name: Install package
        run: |
          pkg=$(find /build -maxdepth 1 -name 'steam-game-idler-git-*.pkg.tar.zst' -print -quit)
          if [[ -z "$pkg" ]]; then
            echo "ERROR: no .pkg.tar.zst found"
            ls -la /build/
            exit 1
          fi
          echo "Package: $(ls -lh "$pkg")"
          pacman -U --noconfirm "$pkg"

      - name: Verify installation
        run: |
          set -e

          echo "=== Installed files ==="
          pacman -Ql steam-game-idler-git

          echo "=== Binary check ==="
          # The package() step renames /usr/bin/Steam Game Idler -> /usr/bin/steam-game-idler.
          # Fail loudly if a path with literal spaces sneaks in.
          if pacman -Ql steam-game-idler-git | awk '{$1=""; print substr($0,2)}' | grep -E '^/usr/(bin|lib)/Steam Game Idler' ; then
            echo "ERROR: package still contains /usr/bin or /usr/lib paths with spaces"
            exit 1
          fi

          bin=/usr/bin/steam-game-idler
          if [[ ! -x "$bin" ]]; then
            echo "ERROR: $bin missing or not executable"
            exit 1
          fi
          ls -lh "$bin"

          echo "=== Desktop file check ==="
          desktop=/usr/share/applications/steam-game-idler.desktop
          if [[ ! -f "$desktop" ]]; then
            echo "ERROR: $desktop missing"
            exit 1
          fi
          # Exec= must point to the renamed binary, never to "Steam Game Idler".
          if ! grep -q '^Exec=/usr/bin/steam-game-idler' "$desktop"; then
            echo "ERROR: $desktop has wrong Exec="
            cat "$desktop"
            exit 1
          fi

          echo "=== Icon check ==="
          icon=/usr/share/icons/hicolor/128x128/apps/steam-game-idler.png
          test -f "$icon" || { echo "ERROR: $icon missing"; exit 1; }

          echo "=== SteamUtility.Cli check ==="
          cli=/usr/lib/steam-game-idler/libs/SteamUtility.Cli
          if [[ ! -x "$cli" ]]; then
            echo "ERROR: $cli missing or not executable"
            exit 1
          fi

          echo "=== SteamUtility.Cli smoke test ==="
          # `detect` runs without a live Steam session and prints the install dir
          # (or a friendly "no install found" — both are fine here).
          "$cli" detect || true
