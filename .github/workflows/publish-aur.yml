name: Publish AUR package

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'packaging/aur/**'
      - 'steam-game-idler/**'
      - 'steam-utility-multiplataform/**'
      - 'scripts/publish-aur.sh'

permissions:
  contents: read

concurrency:
  group: aur-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish steam-game-idler-git
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Configure AUR SSH
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          test -n "$AUR_SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur

          expected_aur_fingerprint='SHA256:RFzBCUItH9LZS0cKB5UE6ceAYhBD5C8GeOBip8Z11+4'
          ssh-keyscan -t ed25519 aur.archlinux.org > ~/.ssh/aur_known_hosts
          actual_aur_fingerprint="$(ssh-keygen -lf ~/.ssh/aur_known_hosts | awk '{ print $2 }')"
          test "$actual_aur_fingerprint" = "$expected_aur_fingerprint"
          cat ~/.ssh/aur_known_hosts >> ~/.ssh/known_hosts

          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF

      - name: Publish to AUR
        run: |
          AUR_PACKAGE=steam-game-idler-git ./scripts/publish-aur.sh
