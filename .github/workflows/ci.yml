name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace:
    name: Workspace checks
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Install Tauri system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: >-
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libsoup-3.0-dev
            libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
          version: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: "steam-game-idler/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: steam-game-idler
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        working-directory: steam-game-idler
        run: pnpm typecheck

      - name: Check Tauri backend
        working-directory: steam-game-idler/src-tauri
        run: cargo check

  aur-metadata:
    name: AUR metadata
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Configure pacman mirrors
        run: |
          # shellcheck disable=SC2016
          printf 'Server = https://mirrors.kernel.org/archlinux/$repo/os/$arch\nServer = https://mirror.rackspace.com/archlinux/$repo/os/$arch\n' \
            > /etc/pacman.d/mirrorlist
          sed -i 's/^#ParallelDownloads.*/ParallelDownloads = 5/' /etc/pacman.conf
          grep -q DisableDownloadTimeout /etc/pacman.conf \
            || echo DisableDownloadTimeout >> /etc/pacman.conf

      - name: Install validation tools
        run: |
          pacman -Syu --noconfirm --needed git base-devel pacman-contrib

      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Validate .SRCINFO
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          runuser -u builder -- bash -lc "cd '$GITHUB_WORKSPACE/packaging/aur' && makepkg --printsrcinfo > /tmp/SRCINFO"
          diff -u packaging/aur/.SRCINFO /tmp/SRCINFO
