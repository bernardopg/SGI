version: 2

# This repository stores the application and CLI as git submodules. Dependabot
# cannot resolve manifests through gitlinks, so npm, Cargo, and NuGet updates
# are managed by the Dependabot configurations in each submodule and promoted
# here by an explicit submodule-pointer update.
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    assignees:
      - "bernardopg"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
