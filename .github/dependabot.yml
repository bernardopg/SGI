version: 2

updates:
  # ── GitHub Actions ─────────────────────────────────────────────────────────
  # Covers all workflow files and composite actions in this repo.
  # Major bumps get individual PRs; minor+patch are batched weekly.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    assignees:
      - "bernardopg"
    reviewers:
      - "bernardopg"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # ── npm / pnpm (steam-game-idler frontend) ─────────────────────────────────
  # Dependabot reads pnpm-lock.yaml and opens PRs for package.json deps.
  # Only production + dev deps that affect the build; test tooling batched.
  - package-ecosystem: "npm"
    directory: "/steam-game-idler"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    assignees:
      - "bernardopg"
    reviewers:
      - "bernardopg"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      # Tauri ecosystem — changes here often need cross-package coordination
      tauri:
        patterns:
          - "@tauri-apps/*"
        update-types:
          - "minor"
          - "patch"
      # HeroUI + Tailwind — UI library suite
      heroui-tailwind:
        patterns:
          - "@heroui/*"
          - "tailwindcss"
          - "tailwind-*"
        update-types:
          - "minor"
          - "patch"
      # React ecosystem
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "minor"
          - "patch"
      # Next.js
      nextjs:
        patterns:
          - "next"
        update-types:
          - "minor"
          - "patch"
      # Dev + tooling — low risk, batch together
      dev-tooling:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Tauri major: coordinate manually with Rust crate bump
      - dependency-name: "@tauri-apps/*"
        update-types: ["version-update:semver-major"]
      # Next.js major: coordinate manually with React ecosystem
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]

  # ── Cargo (Tauri Rust backend) ──────────────────────────────────────────────
  # Covers src-tauri/Cargo.toml + workspace crates.
  # Minor+patch batched; major gets individual PRs to force manual review.
  - package-ecosystem: "cargo"
    directory: "/steam-game-idler/src-tauri"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    assignees:
      - "bernardopg"
    reviewers:
      - "bernardopg"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      # Tauri Rust crates — keep in sync with JS @tauri-apps/* versions
      tauri-crates:
        patterns:
          - "tauri"
          - "tauri-*"
          - "tauri_*"
        update-types:
          - "minor"
          - "patch"
      # Tokio async runtime
      tokio:
        patterns:
          - "tokio"
          - "tokio-*"
        update-types:
          - "minor"
          - "patch"
      # Serde ecosystem
      serde:
        patterns:
          - "serde"
          - "serde_*"
        update-types:
          - "minor"
          - "patch"
      # All other Rust crates — batch minor+patch
      cargo-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Tauri major: must coordinate with @tauri-apps/* JS bump + test full build
      - dependency-name: "tauri"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tauri-*"
        update-types: ["version-update:semver-major"]

  # ── NuGet (.NET 10 SteamUtility.Cli) ───────────────────────────────────────
  # Covers steam-utility-multiplataform/src/SteamUtility.Cli/SteamUtility.Cli.csproj.
  - package-ecosystem: "nuget"
    directory: "/steam-utility-multiplataform/src/SteamUtility.Cli"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    assignees:
      - "bernardopg"
    reviewers:
      - "bernardopg"
    labels:
      - "dependencies"
      - "dotnet"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      nuget-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
