name: Pin Tauri version
description: >
  Patches tauri.conf.json (version + createUpdaterArtifacts), removes the
  production API-key panic from lib.rs, and injects pnpm allowBuilds entries
  when the submodule predates that field.
inputs:
  version:
    description: Semver version string (e.g. 5.0.8)
    required: true
  working-directory:
    description: Path to the steam-game-idler submodule root
    required: false
    default: steam-game-idler
runs:
  using: composite
  steps:
    - name: Patch tauri.conf.json + lib.rs + pnpm-workspace.yaml
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        version="${{ inputs.version }}"
        sed -i -E 's/"version":[[:space:]]*"[^"]*"/"version": "'"$version"'"/' \
          src-tauri/tauri.conf.json
        sed -i 's/"createUpdaterArtifacts":[[:space:]]*"[^"]*"/"createUpdaterArtifacts": false/' \
          src-tauri/tauri.conf.json
        sed -i 's|panic!("No obfuscated API key available in production build");|// embedded key not provided — user configures via Settings|' \
          src-tauri/src/lib.rs
        if ! grep -q '^allowBuilds:' pnpm-workspace.yaml; then
          {
            echo 'allowBuilds:'
            echo "  '@heroui/shared-utils': true"
            echo '  esbuild: true'
            echo '  sharp: true'
          } >> pnpm-workspace.yaml
        fi
        grep '"version"' src-tauri/tauri.conf.json | head -1
        grep '"createUpdaterArtifacts"' src-tauri/tauri.conf.json
