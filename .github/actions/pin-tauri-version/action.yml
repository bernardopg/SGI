name: Prepare Tauri release runtime
description: >
  Verifies that the checked-in runtime manifests match the release version,
  disables updater artifacts for SGI package builds, and injects pnpm
  allowBuilds entries when the submodule predates that field.
inputs:
  version:
    description: Semver version string (e.g. 5.0.8)
    required: true
  working-directory:
    description: Path to the steam-game-idler submodule root
    required: false
    default: steam-game-idler
runs:
  using: composite
  steps:
    - name: Verify runtime manifests + prepare release-only settings
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        version="${{ inputs.version }}"
        node scripts/check-release-version.mjs "$version"
        sed -i 's/"createUpdaterArtifacts":[[:space:]]*"[^"]*"/"createUpdaterArtifacts": false/' \
          src-tauri/tauri.conf.json
        if ! grep -q '^allowBuilds:' pnpm-workspace.yaml; then
          {
            echo 'allowBuilds:'
            echo "  '@heroui/shared-utils': true"
            echo '  esbuild: true'
            echo '  sharp: true'
          } >> pnpm-workspace.yaml
        fi
        node scripts/check-release-version.mjs "$version"
        grep '"createUpdaterArtifacts"' src-tauri/tauri.conf.json
